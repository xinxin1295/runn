name: Build macOS Installer

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'desktop/**'
      - '.github/workflows/build-mac.yml'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Build macOS dmg + zip
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --x64 --config electron-builder-mac.json

      - name: List artifacts
        working-directory: desktop
        run: ls -la release/

      - name: Verify ad-hoc signature
        working-directory: desktop
        run: |
          APP=$(find release -maxdepth 3 -name "*.app" | head -1)
          echo "=== 校验 app: $APP ==="
          codesign -dv --verbose=2 "$APP" 2>&1 || echo "codesign -dv 失败"
          echo "=== 深度校验 ==="
          codesign --verify --deep --strict --verbose=2 "$APP" 2>&1 && echo ">>> 签名有效 SIGN_OK" || echo ">>> 签名无效 SIGN_FAIL"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runn-mac-installer
          path: |
            desktop/release/*.dmg
            desktop/release/*mac*.zip

      - name: Attach to v1.0.0 release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v1.0.0 desktop/release/*.dmg --clobber || true
          gh release upload v1.0.0 desktop/release/*mac*.zip --clobber || true
